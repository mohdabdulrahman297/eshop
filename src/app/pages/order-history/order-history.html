<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4">
  <a class="navbar-brand fw-bold" routerLink="/home">🛍️ eShop</a>
  <div class="ms-auto d-flex gap-2">
    <a routerLink="/home" class="btn btn-outline-light btn-sm">🏠 Home</a>
    <a routerLink="/cart" class="btn btn-outline-light btn-sm">🛒 Cart</a>
  </div>
</nav>

<div class="container py-4" style="max-width: 800px;">
  <h2 class="mb-4">📦 My Orders</h2>

  <!-- EMPTY STATE -->
  <div *ngIf="orders.length === 0" class="text-center py-5 text-muted">
    <div style="font-size: 4rem;">📭</div>
    <h5 class="mt-3">No orders yet</h5>
    <a routerLink="/home" class="btn btn-primary mt-3">Start Shopping</a>
  </div>

  <!-- ORDER CARDS -->
  <div class="card shadow-sm mb-4" *ngFor="let order of orders">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span class="fw-bold">{{ order.id }}</span>
      <span class="badge bg-{{ statusColor(order.status) }}">
        {{ order.status }}
      </span>
    </div>

    <div class="card-body">
      <!-- Items -->
      <div class="d-flex justify-content-between text-muted small mb-2"
           *ngFor="let item of order.items">
        <span>{{ item.emoji }} {{ item.name }} × {{ item.qty }}</span>
        <span>{{ item.price * item.qty | currency }}</span>
      </div>

      <hr class="my-2"/>

      <!-- Footer -->
      <div class="d-flex justify-content-between align-items-center">
        <small class="text-muted">📅 {{ order.date }}</small>
        <span class="fw-bold">{{ order.total | currency }}</span>
      </div>
    </div>
  </div>

</div>
