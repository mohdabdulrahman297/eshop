<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
  <a class="navbar-brand fw-bold" routerLink="/home">🛍️ eShop</a>
  <div class="ms-auto d-flex align-items-center gap-3">
    <span class="text-white-50 small">Hi, {{ currentUser?.name }}</span>
    <a routerLink="/cart" class="btn btn-outline-light btn-sm">🛒 Cart</a>
    <a routerLink="/order-history" class="btn btn-outline-light btn-sm">📦 Orders</a>
    <ng-container *ngIf="isAdmin">
      <a routerLink="/add-product" class="btn btn-outline-warning btn-sm">➕ Add Product</a>
      <a routerLink="/admin-orders" class="btn btn-outline-warning btn-sm">🗂️ Admin Orders</a>
    </ng-container>
    <button class="btn btn-danger btn-sm" (click)="logout()">Logout</button>
  </div>
</nav>

<!-- PRODUCT GRID -->
<div class="container py-4">
  <h2 class="mb-4">All Products</h2>

  <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">

    <div class="col" *ngFor="let product of products">
      <div class="card h-100 shadow-sm">

        <div class="card-img-top bg-light d-flex align-items-center justify-content-center"
             style="height: 180px; font-size: 5rem;">
          {{ product.emoji }}
        </div>

        <div class="card-body d-flex flex-column">
          <span class="badge bg-secondary mb-1" style="width:fit-content">{{ product.category }}</span>
          <h6 class="card-title">{{ product.name }}</h6>
          <p class="card-text text-muted small">{{ product.desc }}</p>
          <p class="text-muted small mb-1">Stock: {{ product.stock }}</p>
          <p class="fw-bold mt-auto">{{ product.price | currency }}</p>

          <div class="d-flex gap-2">
            <a [routerLink]="['/product', product.id]"
               class="btn btn-outline-secondary btn-sm flex-grow-1">View</a>
            <button class="btn btn-sm flex-grow-1"
                    [class.btn-success]="addedProductId === product.id"
                    [class.btn-primary]="addedProductId !== product.id"
                    (click)="addToCart(product)">
              {{ addedProductId === product.id ? '✓ Added' : 'Add to Cart' }}
            </button>
          </div>
        </div>

      </div>
    </div>

  </div>

  <div *ngIf="products.length === 0" class="text-center py-5 text-muted">
    <p>No products available.</p>
  </div>
</div>
